[tool.black]
line-length = 88
target-version = ["py312", "py313"]
extend-exclude = "(\\.venv|venv|migrations|__pycache__|accounts|blog|templates|static)"

[tool.isort]
profile = "black"
line_length = 88
skip = [".venv", "venv", "__pycache__", "migrations", "accounts", "blog", "templates", "static"]

[tool.ruff]
line-length = 88
exclude = [".venv", "venv", "migrations", "__pycache__", "templates", "static"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"blog/tests.py" = ["F841"]
"api/admin.py" = ["F401"]
"api/models.py" = ["F401"]
