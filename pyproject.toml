[tool.black]
line-length = 88
target-version = ["py312", "py313"]
# ??????????????? ??????: ?????? ??????????? ???? ??????? ? API,
# ? ???????????? ??? blog/accounts ???????????? ??????????.
include = "(api|skill_blog|manage\\.py).*\\.py$"
extend-exclude = "(\\.venv|venv|migrations|__pycache__)"

[tool.isort]
profile = "black"
line_length = 88
src_paths = ["api", "skill_blog"]
known_first_party = ["accounts", "blog", "api", "skill_blog"]
skip = [".venv", "venv", "__pycache__", "migrations"]

[tool.ruff]
line-length = 88
exclude = [".venv", "venv", "migrations", "__pycache__", "templates", "static"]

[tool.ruff.lint]
select = ["E", "W", "F", "I", "UP", "B"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"blog/tests.py" = ["F841"]
"api/admin.py" = ["F401"]
"api/models.py" = ["F401"]
