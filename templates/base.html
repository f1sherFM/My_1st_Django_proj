<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Skill Blog{% endblock %}</title>
    <link rel="stylesheet" href="{% load static %}{% static 'css/styles.css' %}">
</head>
<body>
<header class="header">
    <div class="container nav">
        <a class="brand" href="{% url 'blog:post_list' %}">Skill Blog</a>
        <nav>
            <a href="{% url 'blog:post_list' %}">Главная</a>
            <a href="{% url 'blog:category_list' %}">Категории</a>
            {% if user.is_authenticated %}
                <a href="{% url 'blog:post_create' %}">Создать пост</a>
                <a href="{% url 'profile' user.username %}">Профиль</a>
                <form method="post" action="{% url 'logout' %}" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="link-button">Выйти</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Войти</a>
                <a href="{% url 'register' %}">Регистрация</a>
            {% endif %}
        </nav>
    </div>
</header>
<main class="container">
    {% if messages %}
        <ul class="messages">
            {% for message in messages %}
                <li>{{ message }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<footer class="container footer">Учебный проект на Django</footer>
</body>
</html>
